<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love_QnA-HS</title>
  <meta name="description" content="서로에게 궁금한 질문을 남기고 답변하며 추억처럼 기록하는 둘만의 질문 사이트" />
  <meta name="theme-color" content="#b8a7ff" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="마음 질문 사이트" />
  <meta property="og:title" content="현수 페이지 - 마음 질문 사이트" />
  <meta property="og:description" content="현수의 질문을 추가하고 예지의 질문에 답변할 수 있는 페이지" />
  <meta property="og:image" content="icon.ico" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="현수 페이지 - 마음 질문 사이트" />
  <meta name="twitter:description" content="현수의 질문을 추가하고 예지의 질문에 답변할 수 있는 페이지" />
  <link rel="icon" href="icon.ico" sizes="any" />
  <link rel="shortcut icon" href="icon.ico" />
  <link rel="apple-touch-icon" href="icon.ico" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="my">
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">HYUNSUE PAGE</p>
        <h1>현수 질문 / 답변 페이지</h1>
        <p class="sub">현수가 질문을 등록할 수도 있고, 예지가 등록한 질문에 답변할 수도 있습니다.</p>
      </div>
      <nav class="actions-row">
        <a class="btn ghost" href="index.html">홈</a>
      </nav>
    </header>

    <main class="grid layout-main single-column">
      <section class="card">
        <h2>현수 질문 추가하기</h2>
        <form id="myQuestionForm" class="stack">
          <label>
            질문 제목
            <input type="text" id="myQuestionInput" placeholder="예: 나를 처음 봤을 때 어떤 느낌이었어?" required />
          </label>

          <label>
            현수의 답변
            <textarea id="myAnswerInput" rows="5" placeholder="현수의 답변을 적어주세요." required></textarea>
          </label>

          <button type="submit" class="btn primary">현수 질문 추가하기</button>
        </form>
      </section>
    </main>

    <section class="card">
      <div class="section-head">
        <div>
          <h2>전체 질문 정리</h2>
          <p class="muted">현수 질문과 예지 질문을 모두 한 번에 보고 답변 상태를 확인할 수 있습니다.</p>
        </div>
        <div class="pill"><span id="questionCount">0</span>개 질문</div>
      </div>

      <div id="myQuestionsList" class="question-list empty-box">
        아직 등록된 질문이 없습니다.
      </div>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
