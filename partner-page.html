<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love_QnA</title>
  <meta name="description" content="서로에게 궁금한 질문을 남기고 답변하며 추억처럼 기록하는 둘만의 질문 사이트" />
  <meta name="theme-color" content="#b8a7ff" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Love_QnA" />
  <meta property="og:title" content="Love_QnA" />
  <meta property="og:description" content="서로에게 궁금한 질문을 남기고 답변하며 추억처럼 기록하는 둘만의 질문 사이트" />
  <meta property="og:image" content="icon.ico" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Love_QnA" />
  <meta name="twitter:description" content="서로에게 궁금한 질문을 남기고 답변하며 추억처럼 기록하는 둘만의 질문 사이트" />
  <link rel="icon" href="icon.ico" sizes="any" />
  <link rel="shortcut icon" href="icon.ico" />
  <link rel="apple-touch-icon" href="icon.ico" />
  <link rel="icon" href="/icon.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="partner">
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">YEJI PAGE</p>
        <h1>예지 질문 / 답변 페이지</h1>
        <p class="sub">예지가 질문을 등록할 수 있고, 현수 질문에 대한 답변도 입력할 수 있습니다.</p>
      </div>
      <nav class="actions-row">
        <a class="btn ghost" href="index.html">홈</a>
      </nav>
    </header>

    <main class="grid layout-main single-column">
      <section class="card">
        <h2>예지 질문 추가하기</h2>
        <form id="partnerQuestionForm" class="stack">
          <label>
            질문 제목
            <input type="text" id="partnerQuestionInput" placeholder="예: 내가 어떤 점이 가장 좋았어?" required />
          </label>

          <label>
            예지의 답변
            <textarea id="partnerOwnAnswerInput" rows="5" placeholder="예지의 답변을 적어주세요." required></textarea>
          </label>

          <button type="submit" class="btn primary">예지 질문 추가하기</button>
        </form>
      </section>

    </main>

    <section class="card">
      <div class="section-head">
        <div>
          <h2>질문 목록</h2>
          <p class="muted">현수 질문과 예지 질문이 모두 보이며, 각자 필요한 답변을 입력할 수 있습니다.</p>
        </div>
        <div class="pill"><span id="partnerQuestionCount">0</span>개 질문</div>
      </div>

      <div id="partnerQuestionsList" class="question-list empty-box">
        아직 등록된 질문이 없습니다.
      </div>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
