        <p class="eyebrow">MADE FOR US</p>

          각자가 서로에게 궁금한 점들을 언제든지 질문하고 답변하고 기억할 수 있도록 만들었어
        </p>

            <div class="mini-day-date" id="day100Date">2026.06.21</div>
          </div>

            <div class="mini-day-label">D+365</div>

          </div>
        </div>
      </div>
    </header>

    <main class="grid two">
      <a class="card nav-card" href="my-page.html">
        <div class="badge_1">PAGE 1</div>
        <h2>현수만 들어와</h2>
        <p>나의 질문을 추가하고, 상대방의 질문에 답변해주세요.</p>
      </a>

      <a class="card nav-card" href="partner-page.html">

      </a>
    </main>
